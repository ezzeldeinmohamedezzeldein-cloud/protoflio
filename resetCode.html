<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify Reset Code - Liver Cancer Detection AI</title>
    <link rel="icon" href="./styleimages/logo.avif" type="image/x-icon" />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <script src="app-config.js"></script>

    <style>
      /* Base Styles */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Roboto", sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(to bottom right, #0a0a0a, #121212);
        color: #e0e0e0;
        padding: 1rem;
        position: relative;
        overflow-x: hidden;
        opacity: 0;
        animation: fadeIn 1s ease-out forwards;
      }

      /* Page load animation */
      @keyframes fadeIn {
        0% {
          opacity: 0;
          transform: translateY(20px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Main container with split design */
      .main-container {
        display: flex;
        width: 100%;
        max-width: 1200px;
        min-height: 600px;
        border-radius: 1rem;
        overflow: hidden;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        margin: 2rem 0;
        transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275),
          box-shadow 0.5s ease;
        animation: slideIn 1.2s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        opacity: 0;
      }

      /* Initial slide in animation */
      @keyframes slideIn {
        0% {
          opacity: 0;
          transform: translateY(50px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Enhanced hover effect for the main container */
      .main-container:hover {
        transform: translateY(-10px);
        box-shadow: 0 30px 60px -15px rgba(0, 188, 212, 0.3),
          0 15px 30px -10px rgba(106, 27, 154, 0.2);
      }

      /* Image section */
      .image-section {
        flex: 1;
        background-image: url("./styleimages/login image.avif");
        background-size: cover;
        background-position: center;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.5s ease, filter 0.5s ease;
        overflow: hidden;
        animation: imagePulse 6s ease-in-out infinite;
      }

      /* Continuous pulse animation for image */
      @keyframes imagePulse {
        0% {
          filter: brightness(1) contrast(1);
          transform: scale(1);
        }
        50% {
          filter: brightness(1.1) contrast(1.05);
          transform: scale(1.02);
        }
        100% {
          filter: brightness(1) contrast(1);
          transform: scale(1);
        }
      }

      /* Enhanced hover effect for image section */
      .image-section:hover {
        filter: brightness(1.15) contrast(1.1);
      }

      /* Overlay for image section */
      .image-section::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(
          135deg,
          rgba(0, 188, 212, 0.7),
          rgba(106, 27, 154, 0.7)
        );
        opacity: 0.6;
        transition: opacity 0.5s ease, background 0.5s ease;
        animation: gradientShift 8s ease-in-out infinite;
      }

      /* Gradient animation */
      @keyframes gradientShift {
        0% {
          opacity: 0.6;
          background: linear-gradient(
            135deg,
            rgba(0, 188, 212, 0.7),
            rgba(106, 27, 154, 0.7)
          );
        }
        50% {
          opacity: 0.7;
          background: linear-gradient(
            135deg,
            rgba(0, 188, 212, 0.8),
            rgba(106, 27, 154, 0.8)
          );
        }
        100% {
          opacity: 0.6;
          background: linear-gradient(
            135deg,
            rgba(0, 188, 212, 0.7),
            rgba(106, 27, 154, 0.7)
          );
        }
      }

      /* Enhanced hover effect for overlay */
      .image-section:hover::before {
        opacity: 0.7;
        background: linear-gradient(
          135deg,
          rgba(0, 188, 212, 0.8),
          rgba(106, 27, 154, 0.8)
        );
      }

      /* Content for image section */
      .image-content {
        position: relative;
        z-index: 1;
        padding: 2rem;
        text-align: center;
        color: white;
        transition: transform 0.5s ease;
        animation: float 5s ease-in-out infinite;
      }

      /* Floating animation */
      @keyframes float {
        0% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
        100% {
          transform: translateY(0);
        }
      }

      /* Enhanced hover effect for image content */
      .image-section:hover .image-content {
        transform: scale(1.05);
      }

      .image-content h2 {
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 1rem;
        font-family: "Orbitron", sans-serif;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        transition: text-shadow 0.5s ease, color 0.5s ease;
        animation: glow 4s ease-in-out infinite;
      }

      /* Glow animation */
      @keyframes glow {
        0% {
          text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }
        50% {
          text-shadow: 0 0 15px rgba(0, 188, 212, 0.6),
            0 0 30px rgba(0, 188, 212, 0.3);
        }
        100% {
          text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }
      }

      /* Enhanced hover effect for heading */
      .image-section:hover .image-content h2 {
        text-shadow: 0 0 15px rgba(0, 188, 212, 0.8),
          0 0 30px rgba(0, 188, 212, 0.4);
        color: #ffffff;
      }

      .image-content p {
        font-size: 1.25rem;
        max-width: 80%;
        margin: 0 auto;
        line-height: 1.6;
        transition: opacity 0.5s ease, transform 0.5s ease;
        animation: fadeInOut 6s ease-in-out infinite;
      }

      /* Fade animation */
      @keyframes fadeInOut {
        0% {
          opacity: 0.8;
        }
        50% {
          opacity: 1;
        }
        100% {
          opacity: 0.8;
        }
      }

      /* Enhanced hover effect for paragraph */
      .image-section:hover .image-content p {
        opacity: 0.9;
        transform: translateY(5px);
      }

      /* Verify Code section */
      .verify-section {
        flex: 1;
        background-color: rgba(18, 18, 18, 0.95);
        padding: 3rem 2rem;
        display: flex;
        flex-direction: column;
        justify-content: center;
        transition: background-color 0.5s ease, transform 0.5s ease;
        animation: slideFromRight 1.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        opacity: 0;
      }

      /* Slide from right animation */
      @keyframes slideFromRight {
        0% {
          opacity: 0;
          transform: translateX(50px);
        }
        100% {
          opacity: 1;
          transform: translateX(0);
        }
      }

      /* Enhanced hover effect for verify section */
      .verify-section:hover {
        background-color: rgba(22, 22, 22, 0.98);
        transform: scale(1.01);
      }

      .verify-container {
        width: 100%;
        max-width: 400px;
        margin: 0 auto;
        transition: transform 0.5s ease;
      }

      /* Enhanced hover effect for verify container */
      .verify-section:hover .verify-container {
        transform: translateY(-5px);
      }

      .logo-container {
        display: flex;
        justify-content: center;
        margin-bottom: 2rem;
        animation: logoReveal 2s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        opacity: 0;
      }

      /* Logo reveal animation */
      @keyframes logoReveal {
        0% {
          opacity: 0;
          transform: scale(0.8);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }

      .logo-wrapper {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .logo {
        width: 60px;
        height: 60px;
        transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
      }

      .logo:hover {
        transform: scale(1.1);
      }

      .logo-text {
        color: #00bcd4;
        font-family: "Orbitron", sans-serif;
        font-size: 1.875rem;
        font-weight: bold;
        transition: color 0.3s ease, text-shadow 0.3s ease;
        animation: textColorShift 8s ease-in-out infinite;
      }

      /* Text color shift animation */
      @keyframes textColorShift {
        0% {
          color: #00bcd4;
          text-shadow: 0 0 5px rgba(0, 188, 212, 0.3);
        }
        50% {
          color: #6a1b9a;
          text-shadow: 0 0 10px rgba(106, 27, 154, 0.4);
        }
        100% {
          color: #00bcd4;
          text-shadow: 0 0 5px rgba(0, 188, 212, 0.3);
        }
      }

      .logo-text:hover {
        color: #6a1b9a;
        text-shadow: 0 0 15px rgba(106, 27, 154, 0.7);
        animation-play-state: paused;
      }

      .card-header {
        margin-bottom: 2rem;
        transition: transform 0.4s ease;
        animation: fadeInUp 2.2s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        opacity: 0;
      }

      /* Fade in up animation */
      @keyframes fadeInUp {
        0% {
          opacity: 0;
          transform: translateY(20px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Enhanced hover effect for card header */
      .verify-section:hover .card-header {
        transform: translateY(-3px);
      }

      .card-title {
        font-size: 2rem;
        font-weight: bold;
        text-align: center;
        color: #00bcd4;
        font-family: "Orbitron", sans-serif;
        transition: color 0.4s ease, text-shadow 0.4s ease;
        animation: titlePulse 4s ease-in-out infinite;
      }

      /* Title pulse animation */
      @keyframes titlePulse {
        0% {
          color: #00bcd4;
          text-shadow: 0 0 5px rgba(0, 188, 212, 0.2);
        }
        50% {
          color: #00d4e4;
          text-shadow: 0 0 10px rgba(0, 188, 212, 0.4);
        }
        100% {
          color: #00bcd4;
          text-shadow: 0 0 5px rgba(0, 188, 212, 0.2);
        }
      }

      /* Enhanced hover effect for card title */
      .verify-section:hover .card-title {
        color: #00d4e4;
        text-shadow: 0 0 10px rgba(0, 188, 212, 0.4);
        animation-play-state: paused;
      }

      .card-description {
        text-align: center;
        color: #e0e0e0;
        margin-top: 0.5rem;
        font-size: 1.1rem;
        transition: opacity 0.4s ease;
        animation: fadeInOut 6s ease-in-out infinite;
      }

      /* Enhanced hover effect for card description */
      .verify-section:hover .card-description {
        opacity: 0.9;
        animation-play-state: paused;
      }

      .form-group {
        margin-bottom: 1.5rem;
        transition: transform 0.3s ease;
        animation: formGroupSlideIn 0.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        opacity: 0;
      }

      /* Form group slide in animation with delay for each group */
      .form-group:nth-child(1) {
        animation-delay: 2.4s;
      }

      @keyframes formGroupSlideIn {
        0% {
          opacity: 0;
          transform: translateX(-20px);
        }
        100% {
          opacity: 1;
          transform: translateX(0);
        }
      }

      /* Enhanced hover effect for form group */
      .form-group:hover {
        transform: translateX(5px);
      }

      .form-label {
        display: block;
        margin-bottom: 0.5rem;
        color: #e0e0e0;
        font-size: 1.1rem;
        transition: color 0.3s ease, transform 0.3s ease;
      }

      /* Enhanced hover effect for form label */
      .form-group:hover .form-label {
        color: #00bcd4;
        transform: translateX(3px);
      }

      .input-wrapper {
        position: relative;
        transition: transform 0.3s ease;
      }

      .input-icon {
        position: absolute;
        left: 0.75rem;
        top: 0.75rem;
        width: 1.25rem;
        height: 1.25rem;
        color: #00bcd4;
        transition: color 0.3s ease, transform 0.3s ease;
        animation: iconPulse 3s ease-in-out infinite;
      }

      /* Icon pulse animation */
      @keyframes iconPulse {
        0% {
          transform: scale(1);
          color: #00bcd4;
        }
        50% {
          transform: scale(1.1);
          color: #6a1b9a;
        }
        100% {
          transform: scale(1);
          color: #00bcd4;
        }
      }

      /* Enhanced hover effect for input icon */
      .input-wrapper:hover .input-icon {
        color: #6a1b9a;
        transform: scale(1.1);
        animation-play-state: paused;
      }

      .form-input {
        width: 100%;
        padding: 1rem 0.75rem 1rem 2.75rem;
        background-color: rgba(30, 30, 30, 0.7);
        border: 1px solid rgba(0, 188, 212, 0.3);
        border-radius: 0.25rem;
        color: #e0e0e0;
        transition: all 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
        font-size: 1.1rem;
        animation: borderGlow 4s ease-in-out infinite;
      }

      /* Border glow animation */
      @keyframes borderGlow {
        0% {
          border-color: rgba(0, 188, 212, 0.3);
          box-shadow: 0 0 0 rgba(0, 188, 212, 0);
        }
        50% {
          border-color: rgba(0, 188, 212, 0.6);
          box-shadow: 0 0 10px rgba(0, 188, 212, 0.2);
        }
        100% {
          border-color: rgba(0, 188, 212, 0.3);
          box-shadow: 0 0 0 rgba(0, 188, 212, 0);
        }
      }

      .form-input:focus {
        outline: none;
        border-color: #00bcd4;
        box-shadow: 0 0 0 2px rgba(0, 188, 212, 0.2);
        transform: translateY(-2px);
        animation-play-state: paused;
      }

      /* Enhanced hover effect for form input */
      .form-input:hover {
        background-color: rgba(35, 35, 35, 0.8);
        border-color: rgba(0, 188, 212, 0.5);
        box-shadow: 0 0 10px rgba(0, 188, 212, 0.2);
        animation-play-state: paused;
      }

      .message {
        padding: 0.75rem;
        margin-top: 1rem;
        border-radius: 0.25rem;
        font-size: 0.875rem;
        transition: transform 0.3s ease, background-color 0.3s ease;
        display: none;
      }

      .message.success {
        background-color: rgba(76, 175, 80, 0.1);
        color: #4caf50;
      }

      .message.error {
        background-color: rgba(244, 67, 54, 0.1);
        color: #f44336;
      }

      .message.visible {
        display: block;
      }

      /* Enhanced hover effect for message */
      .message:hover {
        transform: scale(1.02);
      }

      .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        padding: 1rem 1rem;
        background: linear-gradient(to right, #00bcd4, #6a1b9a);
        color: white;
        border: none;
        border-radius: 9999px;
        font-size: 1.2rem;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        position: relative;
        overflow: hidden;
        margin-top: 1rem;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        animation: buttonPulse 3s ease-in-out infinite,
          fadeInUp 3s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        opacity: 0;
      }

      /* Button pulse animation */
      @keyframes buttonPulse {
        0% {
          box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
          background: linear-gradient(to right, #00bcd4, #6a1b9a);
        }
        50% {
          box-shadow: 0 7px 15px rgba(106, 27, 154, 0.3),
            0 0 20px rgba(0, 188, 212, 0.2);
          background: linear-gradient(to right, #00d4e4, #7c21b3);
        }
        100% {
          box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
          background: linear-gradient(to right, #00bcd4, #6a1b9a);
        }
      }

      .btn::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          to right,
          transparent,
          rgba(255, 255, 255, 0.2),
          transparent
        );
        transition: all 0.7s ease;
        animation: shimmer 3s infinite;
      }

      /* Shimmer animation */
      @keyframes shimmer {
        0% {
          left: -100%;
        }
        100% {
          left: 100%;
        }
      }

      .btn:hover {
        transform: translateY(-5px) scale(1.03);
        box-shadow: 0 7px 15px rgba(106, 27, 154, 0.4),
          0 0 20px rgba(0, 188, 212, 0.3);
        background: linear-gradient(to right, #00d4e4, #7c21b3);
        animation-play-state: paused;
      }

      .btn:hover::before {
        left: 100%;
      }

      .btn:active {
        transform: translateY(-2px);
      }

      .btn:disabled {
        background: linear-gradient(to right, #424242, #616161);
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
        animation-play-state: paused;
      }

      .btn:disabled::before {
        display: none;
      }

      .btn-icon {
        margin-right: 0.5rem;
        width: 1.25rem;
        height: 1.25rem;
        transition: transform 0.3s ease;
        animation: iconRotate 6s linear infinite;
      }

      /* Icon rotate animation */
      @keyframes iconRotate {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* Enhanced hover effect for button icon */
      .btn:hover .btn-icon {
        transform: translateX(-3px);
        animation-play-state: paused;
      }

      .spinner {
        display: inline-block;
        width: 1.25rem;
        height: 1.25rem;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-top: 3px solid white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-right: 0.5rem;
      }

      /* Animations */
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .footer {
        margin-top: 2rem;
        text-align: center;
        color: #e0e0e0;
        font-size: 0.875rem;
        width: 100%;
        transition: opacity 0.3s ease;
        animation: fadeIn 3.5s ease-out forwards;
        opacity: 0;
      }

      .footer:hover {
        opacity: 0.9;
      }

      .footer p {
        margin-bottom: 0.5rem;
      }

      .footer-links {
        margin-top: 0.5rem;
      }

      .footer-link {
        color: #00bcd4;
        text-decoration: none;
        transition: color 0.3s ease, transform 0.3s ease, text-shadow 0.3s ease;
        margin: 0 0.5rem;
        display: inline-block;
        animation: linkPulse 4s ease-in-out infinite;
        animation-delay: calc(var(--i, 0) * 0.5s);
      }

      .footer-link:nth-child(1) {
        --i: 1;
      }

      .footer-link:nth-child(2) {
        --i: 2;
      }

      .footer-link:nth-child(3) {
        --i: 3;
      }

      .footer-link:hover {
        color: #6a1b9a;
        transform: translateY(-2px);
        text-shadow: 0 0 8px rgba(106, 27, 154, 0.4);
        animation-play-state: paused;
      }

      /* Responsive design */
      @media (max-width: 992px) {
        .main-container {
          flex-direction: column;
          max-width: 600px;
        }

        .image-section {
          min-height: 300px;
        }

        .verify-section {
          padding: 2rem 1.5rem;
        }
      }

      @media (max-width: 576px) {
        .main-container {
          margin: 1rem 0;
        }

        .image-section {
          min-height: 200px;
        }

        .image-content h2 {
          font-size: 2rem;
        }

        .image-content p {
          font-size: 1rem;
        }

        .verify-section {
          padding: 1.5rem 1rem;
        }

        .card-title {
          font-size: 1.75rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="main-container">
      <!-- Image Section -->
      <div class="image-section">
        <div class="image-content">
          <h2>Verification Required</h2>
          <p>Enter the reset code sent to your email to continue</p>
        </div>
      </div>

      <!-- Verify Code Section -->
      <div class="verify-section">
        <div class="verify-container">
          <div class="logo-container">
            <div class="logo-wrapper">
              <img src="./styleimages/logo.avif" alt="Logo" class="logo" />
              <h1 class="logo-text">Detection AI</h1>
            </div>
          </div>

          <div class="card-header">
            <h2 class="card-title">Verify Reset Code</h2>
            <p class="card-description">Enter the code we sent to your email</p>
          </div>

          <form id="verify-reset-code-form">
            <div class="form-group">
              <label for="resetCode" class="form-label">Reset Code</label>
              <div class="input-wrapper">
                <svg
                  class="input-icon"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
                  ></path>
                </svg>
                <input
                  type="text"
                  id="resetCode"
                  name="resetCode"
                  class="form-input"
                  placeholder="Enter your reset code"
                  required
                />
              </div>
            </div>

            <div id="message" class="message hidden"></div>

            <button type="submit" class="btn">
              <svg
                class="btn-icon"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
                ></path>
              </svg>
              Verify Code
            </button>
          </form>
        </div>
      </div>
    </div>

    <footer class="footer">
      <p>© 2024 Liver Cancer Detection AI. All rights reserved.</p>
      <div class="footer-links">
        <a href="#" class="footer-link">Privacy Policy</a>
        <a href="#" class="footer-link">Terms of Service</a>
        <a href="mailto:livercancerdetectionai@gmail.com" class="footer-link"
          >Contact Us</a
        >
      </div>
    </footer>

    <script>
      // DOM Elements
      const verifyForm = document.getElementById("verify-reset-code-form");
      const messageElement = document.getElementById("message");
      const formInputs = document.querySelectorAll(".form-input");
      const animatedElements = document.querySelectorAll(
        ".image-section, .logo, .logo-text, .card-title, .card-description, .input-icon, .form-input, .btn, .btn-icon"
      );

      // Function to pause animations when user starts typing
      function handleInputChange() {
        const hasInput = Array.from(formInputs).some(
          (input) => input.value.trim() !== ""
        );

        if (hasInput) {
          // Pause animations when user starts typing
          animatedElements.forEach((el) => {
            el.style.animationPlayState = "paused";
          });
        } else {
          // Resume animations when all inputs are empty
          animatedElements.forEach((el) => {
            el.style.animationPlayState = "running";
          });
        }
      }

      // Add input event listeners to all form inputs
      formInputs.forEach((input) => {
        input.addEventListener("input", handleInputChange);
      });

      verifyForm.addEventListener("submit", async (event) => {
        event.preventDefault(); // Prevent form from reloading the page

        const resetCode = document.getElementById("resetCode").value;

        // Hide the message area initially
        messageElement.classList.remove("visible");
        messageElement.classList.add("hidden");

        // Show loading state on button
        const submitBtn = verifyForm.querySelector('button[type="submit"]');
        const originalBtnContent = submitBtn.innerHTML;
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner"></span>Verifying...';

        try {
          const response = await fetch(
            `${BACKEND_NGROK.API}/api/patient/verifyresetcode`,
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ resetCode }), // Send resetCode to backend
            }
          );

          const data = await response.json();

          // Show the message area
          messageElement.classList.remove("hidden");
          messageElement.classList.add("visible");

          if (response.ok) {
            // Successfully verified the reset code
            messageElement.textContent = data.message; // Show success message
            messageElement.classList.remove("error");
            messageElement.classList.add("success");

            // Redirect after a short delay
            setTimeout(() => {
              window.location.href = "RESETPASSWORDD.html"; // Navigate to reset password page
            }, 1500);
          } else {
            // Display error message from the backend
            messageElement.textContent =
              data.message || "Failed to verify reset code.";
            messageElement.classList.remove("success");
            messageElement.classList.add("error");

            // Reset button
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalBtnContent;
          }
        } catch (error) {
          console.error("Error verifying reset code:", error);
          messageElement.textContent = "An error occurred. Please try again.";
          messageElement.classList.remove("success");
          messageElement.classList.add("error");
          messageElement.classList.remove("hidden");
          messageElement.classList.add("visible");

          // Reset button
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalBtnContent;
        }
      });
    </script>
  </body>
</html>
